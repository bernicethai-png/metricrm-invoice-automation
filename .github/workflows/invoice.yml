name: MetriCRM Monthly Invoice

# 每月3号 11:30 (UTC+8 是 03:30 UTC)
on:
  schedule:
    - cron: '30 3 3 * *'  # 每月3号 03:30 UTC (马来西亚时间 11:30)

  # 允许手动触发
  workflow_dispatch:

jobs:
  generate-and-send-invoice:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install dropbox

      - name: Generate Invoice
        run: |
          python auto_invoice_generator.py
        env:
          INVOICE_DATE: ${{ github.run_number }}

      - name: Upload to Dropbox and Send Email
        run: |
          python github_actions_invoice.py
        env:
          DROPBOX_TOKEN: ${{ secrets.DROPBOX_TOKEN }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          PDF_PATH: ./output_invoice.pdf

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: workflow-logs
          path: |
            *.log
            output_invoice.pdf
